<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photon Racing | STEM Team</title>
    
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <style>
        :root {
            --primary-yellow: #ffeb00;  
            --deep-black: #050505;      
            --card-bg: rgba(10, 10, 10, 0.75);
            --text-light: #ffffff;
            --text-muted: #888888;
            --text-dark: #000000;
        }

        /* Prevent system jump behavior */
        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #000000;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* Fixed 3D Parallax Background Layer - Bright, ultra-smooth gradient */
        #cinematic-bg {
            position: fixed;
            top: -30vh; 
            left: 0;
            width: 100vw;
            height: 160vh;
            background: linear-gradient(180deg, 
                #ffeb00 0%, 
                #ccbc00 12%,
                #8c8100 28%,
                #403b00 48%,
                #141300 70%,
                #050505 88%,
                #000000 100%
            );
            z-index: -2;
            pointer-events: none;
            transform: translateY(0);
            will-change: transform;
        }

        /* Subtle grid overlay to enhance the 3D high-tech track depth */
        #bg-grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(rgba(255, 235, 0, 0.015) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 235, 0, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            pointer-events: none;
        }

        /* Scroll Animation Target Classes */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.9s cubic-bezier(0.215, 0.610, 0.355, 1), 
                        transform 0.9s cubic-bezier(0.215, 0.610, 0.355, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Navigation Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            background-color: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(255, 235, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav h1 {
            color: var(--primary-yellow);
            margin: 0;
            letter-spacing: 4px;
            font-weight: 900;
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(255, 235, 0, 0.2);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 35px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: color 0.3s, text-shadow 0.3s;
        }

        nav a:hover {
            color: var(--primary-yellow);
            text-shadow: 0 0 8px rgba(255, 235, 0, 0.5);
        }

        /* Hero / Launch Section */
        #hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 90vh;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        #hero h2 {
            font-size: 4.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 0 0 10px 0;
            font-weight: 900;
            background: linear-gradient(180deg, #ffffff 30%, #a1a1a1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #hero p {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--primary-yellow);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0 0 45px 0;
        }

        #car-viewer {
            width: 90%;
            max-width: 1100px;
            height: 480px;
            background: radial-gradient(circle at center, #111111 0%, #020202 100%);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
        }

        /* General Section Layout */
        section {
            padding: 140px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 70px;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: var(--primary-yellow);
            margin: 15px auto 0 auto;
            border-radius: 2px;
        }

        /* Structured Team Layout Split */
        .sub-tier-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--primary-yellow);
            text-align: center;
            margin-bottom: 35px;
            font-weight: 800;
            opacity: 0.85;
        }

        .team-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 35px;
        }

        .team-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            overflow: hidden;
            text-align: center;
            width: 280px; 
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), 
                        border-color 0.4s, box-shadow 0.4s;
        }

        .team-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 235, 0, 0.3);
            box-shadow: 0 20px 40px rgba(255, 235, 0, 0.05);
        }

        .member-image-slot {
            width: 100%;
            height: 290px;
            background-color: #0d0d0d;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .member-info {
            padding: 25px 20px;
        }

        .member-info h4 {
            margin: 0 0 6px 0;
            font-size: 1.3rem;
            font-weight: 800;
        }

        .member-info p {
            margin: 0;
            color: #ffffff;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.7;
        }

        /* Corporate Sponsorships Section */
        .sponsor-tier-container {
            display: flex;
            flex-direction: column;
            gap: 70px;
        }

        .tier-group {
            text-align: center;
        }

        .tier-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 800;
            margin-bottom: 35px;
            color: var(--text-muted);
        }
